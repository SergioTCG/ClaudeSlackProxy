name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Syntax-check JS
        run: |
          for f in daemon/*.mjs channel/*.mjs; do node --check "$f"; done
      - name: Shellcheck scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck -S warning bin/ccs bin/ccs-consent hooks/hook.sh install.sh
