# Slack app manifest for the Claude Code bridge.
# Create the app at https://api.slack.com/apps → "Create New App" → "From a manifest",
# pick the workspace, paste this file. Then:
#   1. Basic Information → App-Level Tokens → Generate token with scope `connections:write` (xapp-…)
#   2. Install App → install to workspace → copy Bot User OAuth Token (xoxb-…)
# No user token needed: design v2 never archives/unarchives channels.
display_information:
  name: Claude Code Bridge
  description: Bidirectional bridge between Slack and local Claude Code sessions
  background_color: "#1a1a2e"
features:
  bot_user:
    display_name: claude-code
    always_online: true
oauth_config:
  scopes:
    bot:
      - chat:write        # post/update messages, streaming, setStatus (since 2026-03)
      - channels:manage   # create/rename public channels
      - channels:read
      - channels:history  # receive messages in public channels it's in
      - groups:write      # create/rename private channels
      - groups:read
      - groups:history
      - files:write       # upload long outputs
      - files:read        # download attachments sent from Slack
      - users:read
settings:
  event_subscriptions:
    bot_events:
      - message.channels
      - message.groups
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
